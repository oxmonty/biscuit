version: 2
project_name: biscuit

builds:
  - main: ./cmd/biscuit
    binary: biscuit
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
      - "386"
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: windows
        goarch: "386"
    ldflags:
      - -s -w
      - -X github.com/oxmonty/biscuit/internal/version.Version={{.Version}}
      - -X github.com/oxmonty/biscuit/internal/version.Commit={{.ShortCommit}}
      - -X github.com/oxmonty/biscuit/internal/version.Date={{.Date}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  disable: true # release-please owns the changelog

release:
  prerelease: auto

# two channels mirroring npm's dist-tags: biscuit-cli tracks stable releases only
# (like npm `latest`), biscuit-cli@next tracks every release (like npm `next`) —
# one prerelease channel for any maturity (alpha/beta/rc live in the version string)
homebrew_casks:
  # named biscuit-cli to match the npm package; the installed command stays `biscuit`
  - name: biscuit-cli
    skip_upload: auto # prerelease tags leave the stable cask untouched
    repository:
      owner: oxmonty
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    binaries: [biscuit] # cask is named biscuit-cli; the archive's binary is not
    caveats: |
      Installed command: biscuit   (stable channel)

        Get started:          biscuit --help
        Upgrade:              brew upgrade biscuit-cli
        Prerelease channel:   brew uninstall --cask biscuit-cli && brew install oxmonty/tap/biscuit-cli@next

      Conflicts with biscuit-cli@next (both install `biscuit`) — keep only one.
    homepage: https://github.com/oxmonty/biscuit
    description: Generate a production-ready CLI repository from an OpenAPI 3.x spec
    # unsigned binaries: strip the quarantine attribute so macOS runs them
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/biscuit"]
          end
  - name: biscuit-cli@next
    repository:
      owner: oxmonty
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    binaries: [biscuit]
    caveats: |
      Installed command: biscuit   (prerelease channel — alpha/beta/rc builds)

        Get started:        biscuit --help
        Upgrade:            brew upgrade biscuit-cli@next
        Switch to stable:   brew uninstall --cask biscuit-cli@next && brew install oxmonty/tap/biscuit-cli

      Conflicts with the stable biscuit-cli cask (both install `biscuit`) — keep only one.
    homepage: https://github.com/oxmonty/biscuit
    description: Generate a production-ready CLI repository from an OpenAPI 3.x spec (prerelease channel)
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/biscuit"]
          end
