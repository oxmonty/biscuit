name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # npm trusted publishing (OIDC)

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Publish npm packages
        # platform packages first, then the biscuit-cli shim (order matters:
        # the shim's optionalDependencies must be resolvable when it lands)
        run: node scripts/publish_npm.mjs "${GITHUB_REF_NAME#v}"
