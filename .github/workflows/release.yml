name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm trusted publishing (OIDC)

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # runs here, not on a tag trigger: release-please tags with GITHUB_TOKEN,
  # and GITHUB_TOKEN-created events never trigger workflows
  goreleaser:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Update npm
        # trusted publishing (OIDC) needs npm >= 11.5; node 22 bundles npm 10
        run: npm install -g npm@latest
      - name: Publish npm packages
        # platform packages first, then the biscuit-cli shim (order matters:
        # the shim's optionalDependencies must be resolvable when it lands)
        run: node scripts/publish_npm.mjs "${TAG_NAME#v}"
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          # bootstrap only: trusted publishing (OIDC) can't be configured until a
          # package exists, so the first release authenticates with this token.
          # Once OIDC is set up on all packages, delete the secret.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
